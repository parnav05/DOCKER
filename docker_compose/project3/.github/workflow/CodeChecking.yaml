
name: Code-Checking

on:
  push:
    branches: 
      - main

jobs:
  code-check:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v6
 
      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: initialize codeQL
        uses: github/codeql-action/init@v3
        with: 
          language: java

      - name: build application
        uses: mvn clean install 

      - name: perform code-checking
        uses: github/codeql-action/analyze@v3az
