<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: #fff; border-radius: 12px; width: 480px; height: 600px; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,.1); overflow: hidden; }
    #header { background: #2d6cdf; color: #fff; padding: 16px 20px; font-size: 16px; font-weight: 600; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { background: #e9ecef; padding: 10px 14px; border-radius: 10px; max-width: 80%; }
    .msg.mine { background: #2d6cdf; color: #fff; align-self: flex-end; }
    .msg .meta { font-size: 11px; opacity: .6; margin-bottom: 4px; }
    #input-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #eee; }
    #msg-input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    #send-btn { background: #2d6cdf; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
    #join-screen { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; gap: 12px; justify-content: center; align-items: center; padding: 32px; z-index: 10; border-radius: 12px; }
    #join-screen input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    #join-btn { background: #2d6cdf; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; width: 100%; }
    h2 { font-size: 18px; color: #333; }
  </style>
</head>
<body>
  <div id="app" style="position:relative">
    <div id="join-screen">
      <h2>Join a Room</h2>
      <input id="username" placeholder="Your name" />
      <input id="roomname" placeholder="Room name" />
      <button id="join-btn">Join</button>
    </div>
    <div id="header">Chat Room</div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
